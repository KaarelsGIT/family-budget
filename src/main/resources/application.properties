spring.application.name=family-budget-application
server.error.include-message=always

server.address=0.0.0.0

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/family_budget?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
